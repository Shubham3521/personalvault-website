<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — PersonalVault</title>
  <meta name="robots" content="noindex,nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css?v=20260316">
  <link rel="icon" href="logo.png" type="image/png">

  <style>
    /* ─────────────────────────────────────────────────────────
       Admin Layout
    ───────────────────────────────────────────────────────── */
    body { background: var(--deep-navy); }

    .admin-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Topbar */
    .admin-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6,12,20,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 24px;
    }

    .admin-topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 16px;
    }

    .admin-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-white);
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
    }

    .admin-logo img { height: 30px; }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: var(--radius-full);
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--saffron);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .admin-topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-user-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--saffron);
    }

    /* Main content area */
    .admin-main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ─── Login card ─────────────────────────────────────── */
    .admin-login-wrap {
      min-height: calc(100vh - 61px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .admin-login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 40px 36px 44px;
      box-shadow: var(--shadow-lg);
    }

    .admin-login-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-lg);
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .admin-login-card h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .admin-login-card p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .admin-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text-white);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      margin-bottom: 14px;
    }

    .admin-input:focus {
      border-color: rgba(249,115,22,0.5);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.08);
    }

    .admin-input::placeholder { color: var(--text-tertiary); }

    /* ─── Stat cards ─────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 20px 20px 18px;
      transition: border-color var(--transition-base), transform var(--transition-base);
    }

    .stat-card:hover {
      border-color: var(--card-hover-border);
      transform: translateY(-1px);
    }

    .stat-card-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }

    .stat-card-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-white);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .stat-card-sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    .stat-card.highlight .stat-card-value { color: var(--teal); }
    .stat-card.paid .stat-card-value { color: var(--saffron); }

    /* ─── Tabs ───────────────────────────────────────────── */
    .admin-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 0;
    }

    .admin-tab {
      padding: 9px 16px 11px;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: color var(--transition-fast), border-color var(--transition-fast);
      position: relative;
      bottom: -1px;
    }

    .admin-tab:hover { color: var(--text-secondary); }

    .admin-tab.active {
      color: var(--text-white);
      border-bottom-color: var(--saffron);
    }

    /* ─── Toolbar ────────────────────────────────────────── */
    .admin-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .admin-toolbar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .admin-toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .admin-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
      text-decoration: none;
    }

    .admin-btn.primary {
      background: var(--saffron);
      color: #fff;
      border: none;
    }

    .admin-btn.primary:hover { background: var(--saffron-hover); transform: translateY(-1px); }

    .admin-btn.ghost {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: var(--text-secondary);
    }

    .admin-btn.ghost:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
      color: var(--text-white);
    }

    .admin-btn.danger {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.2);
      color: #EF4444;
    }

    .admin-btn.danger:hover { background: rgba(239,68,68,0.15); }

    /* ─── Table ──────────────────────────────────────────── */
    .table-wrap {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .scroll-x { overflow-x: auto; }

    table.admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .admin-table thead th {
      padding: 11px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }

    .admin-table tbody td {
      padding: 12px 14px;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
      white-space: nowrap;
    }

    .admin-table tbody tr:last-child td { border-bottom: none; }

    .admin-table tbody tr {
      transition: background var(--transition-fast);
      cursor: pointer;
    }

    .admin-table tbody tr:hover td { background: rgba(255,255,255,0.025); }

    /* Status pills */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pill::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .pill.paid    { background: rgba(45,212,191,0.1);  color: var(--teal);    border: 1px solid rgba(45,212,191,0.2); }
    .pill.paid::before  { background: var(--teal); }
    .pill.created { background: rgba(251,191,36,0.1);  color: #FBBF24;        border: 1px solid rgba(251,191,36,0.2); }
    .pill.created::before { background: #FBBF24; }
    .pill.failed  { background: rgba(239,68,68,0.1);   color: #EF4444;        border: 1px solid rgba(239,68,68,0.2); }
    .pill.failed::before  { background: #EF4444; }

    .pill.ship-complete { background: rgba(45,212,191,0.1);  color: var(--teal);  border: 1px solid rgba(45,212,191,0.2); }
    .pill.ship-complete::before { background: var(--teal); }
    .pill.ship-partial  { background: rgba(251,191,36,0.1);  color: #FBBF24;      border: 1px solid rgba(251,191,36,0.2); }
    .pill.ship-partial::before  { background: #FBBF24; }
    .pill.ship-pending  { background: rgba(255,255,255,0.04); color: var(--text-tertiary); border: 1px solid rgba(255,255,255,0.08); }
    .pill.ship-pending::before  { background: var(--text-tertiary); }

    /* Expanded row */
    .row-expanded-tr td {
      cursor: default;
      background: rgba(249,115,22,0.03) !important;
      border-bottom: 1px solid rgba(249,115,22,0.08) !important;
    }

    .expanded-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px 20px;
      padding: 4px 0 8px;
    }

    .expanded-field {
      font-size: 13px;
    }

    .expanded-field-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .expanded-field-value {
      color: var(--text-white);
      font-size: 13px;
      word-break: break-all;
      white-space: normal;
    }

    /* ─── Export panel ───────────────────────────────────── */
    .export-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 32px;
    }

    .export-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 16px;
      flex-wrap: wrap;
    }

    .export-item:last-child { border-bottom: none; padding-bottom: 0; }
    .export-item:first-child { padding-top: 0; }

    .export-item-info h4 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-white);
      margin-bottom: 4px;
    }

    .export-item-info p {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* ─── Empty state ────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .empty-state p { color: var(--text-tertiary); font-size: 14px; }

    /* ─── Loading skeleton ───────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-sm);
      display: inline-block;
    }

    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ─── Refresh btn ────────────────────────────────────── */
    #refresh-btn.spinning svg,
    #refresh-btn.spinning::before { animation: spin 0.7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Mobile ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .admin-main { padding: 20px 16px 48px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .admin-login-card { padding: 28px 20px 32px; }
      .admin-topbar { padding: 0 16px; }
    }

    @media (max-width: 420px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="admin-wrap">

  <!-- Top bar -->
  <header class="admin-topbar">
    <div class="admin-topbar-inner">
      <a href="/" class="admin-logo">
        <img src="logo.png" alt="">
        <span>PersonalVault</span>
        <span class="admin-badge">Admin</span>
      </a>
      <div class="admin-topbar-actions" id="topbar-actions">
        <!-- injected after login -->
      </div>
    </div>
  </header>

  <!-- App root -->
  <div id="app"></div>

</div>

<script>
(() => {
const API = '/api/admin';

// ── DOM helpers ────────────────────────────────────────────────
const app  = document.getElementById('app');
const tbAct = document.getElementById('topbar-actions');

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Auth ───────────────────────────────────────────────────────
function getToken(){ return localStorage.getItem('pv_admin_token'); }
function authH(){ const t=getToken(); return t?{'Authorization':'Bearer '+t}:{}; }

async function apiFetch(path){
  const res = await fetch(API + path, { headers: authH() });
  if(res.status===401){ clearLogin(); showLogin(); throw new Error('unauth'); }
  return res;
}

function clearLogin(){ localStorage.removeItem('pv_admin_token'); }

// ── Login ──────────────────────────────────────────────────────
function showLogin(){
  tbAct.innerHTML = '';
  app.innerHTML = `
    <div class="admin-login-wrap">
      <div class="admin-login-card">
        <div class="admin-login-icon">🔐</div>
        <h2>Admin Login</h2>
        <p>Enter the admin password to access the dashboard.</p>
        <input class="admin-input" type="password" id="pw-input" placeholder="Admin password" autocomplete="current-password">
        <button class="admin-btn primary" id="login-btn" style="width:100%;justify-content:center;padding:11px 14px;font-size:15px;">
          Sign in →
        </button>
        <p id="login-err" style="color:#EF4444;font-size:13px;margin-top:10px;display:none;"></p>
      </div>
    </div>`;

  const pw   = document.getElementById('pw-input');
  const btn  = document.getElementById('login-btn');
  const err  = document.getElementById('login-err');

  async function doLogin(){
    const password = pw.value;
    if(!password){ return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    err.style.display = 'none';
    try {
      const res = await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});
      if(res.status===200){
        const j = await res.json();
        localStorage.setItem('pv_admin_token', j.token);
        showDashboard();
      } else {
        const j = await res.json().catch(()=>({}));
        err.textContent = j.error || 'Incorrect password. Please try again.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign in →';
        pw.focus();
      }
    } catch(e) {
      err.textContent = 'Network error. Please try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign in →';
    }
  }

  btn.addEventListener('click', doLogin);
  pw.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  pw.focus();
}

// ── Dashboard ──────────────────────────────────────────────────
let activeTab = 'orders';
let statsData = null;

async function showDashboard(){
  // Topbar
  tbAct.innerHTML = `
    <button class="admin-btn ghost" id="refresh-btn" title="Refresh data">
      ↻ Refresh
    </button>
    <button class="admin-btn danger" id="logout-btn">Sign out</button>
  `;
  document.getElementById('logout-btn').addEventListener('click', ()=>{ clearLogin(); showLogin(); });
  document.getElementById('refresh-btn').addEventListener('click', ()=>{ loadTabContent(activeTab); loadStats(); });

  // Main layout
  app.innerHTML = `
    <div class="admin-main">
      <!-- Stats -->
      <div class="stats-row" id="stats-row">${renderStatsLoading()}</div>
      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab ${activeTab==='orders'?'active':''}" data-tab="orders">Orders</button>
        <button class="admin-tab ${activeTab==='waitlist'?'active':''}" data-tab="waitlist">Waitlist</button>
        <button class="admin-tab ${activeTab==='export'?'active':''}" data-tab="export">Export</button>
      </div>
      <!-- Content -->
      <div id="tab-content"></div>
    </div>`;

  // Tab switching
  document.querySelectorAll('.admin-tab').forEach(t => {
    t.addEventListener('click', () => {
      activeTab = t.dataset.tab;
      document.querySelectorAll('.admin-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      loadTabContent(activeTab);
    });
  });

  await Promise.all([loadStats(), loadTabContent(activeTab)]);
}

// ── Stats ──────────────────────────────────────────────────────
function renderStatsLoading(){
  const labels = ['Total Orders','Total Paid','Revenue (₹)','Waitlist'];
  return labels.map(l => `
    <div class="stat-card">
      <div class="stat-card-label">${l}</div>
      <div class="stat-card-value"><span class="skeleton" style="width:60px;height:32px;display:block;border-radius:6px;"></span></div>
    </div>`).join('');
}

async function loadStats(){
  try {
    const res = await apiFetch('/stats');
    const s = await res.json();
    statsData = s;
    const row = document.getElementById('stats-row');
    if(!row) return;
    row.innerHTML = `
      <div class="stat-card">
        <div class="stat-card-label">Total Orders</div>
        <div class="stat-card-value">${s.totalOrders ?? 0}</div>
        <div class="stat-card-sub">All time</div>
      </div>
      <div class="stat-card paid">
        <div class="stat-card-label">Total Paid</div>
        <div class="stat-card-value">${s.totalPaid ?? 0}</div>
        <div class="stat-card-sub">Completed payments</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-card-label">Revenue (₹)</div>
        <div class="stat-card-value">₹${((s.totalRevenue||0)/100).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
        <div class="stat-card-sub">Gross total</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Waitlist</div>
        <div class="stat-card-value">${s.totalWaitlist ?? 0}</div>
        <div class="stat-card-sub">Email signups</div>
      </div>`;
  } catch(e) { /* handled in apiFetch */ }
}

// ── Tab router ─────────────────────────────────────────────────
async function loadTabContent(tab){
  const c = document.getElementById('tab-content');
  if(!c) return;
  c.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>Loading…</p></div>`;
  if(tab==='orders')   await showOrders(c);
  else if(tab==='waitlist') await showWaitlist(c);
  else if(tab==='export')   showExport(c);
}

// ── Orders ─────────────────────────────────────────────────────
async function showOrders(c){
  try {
    const res = await apiFetch('/orders');
    const orders = await res.json();
    if(!orders.length){
      c.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No orders yet.</p></div>`;
      return;
    }
    c.innerHTML = `
      <div class="admin-toolbar">
        <span class="admin-toolbar-title">${orders.length} order${orders.length!==1?'s':''} — newest first</span>
      </div>
      <div class="table-wrap">
        <div class="scroll-x">
          <table class="admin-table" id="orders-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Amount</th>
                <th>Payment</th>
                <th>Shipping</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </div>`;
    renderOrderRows(orders);
  } catch(e) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load orders. Please refresh.</p></div>`;
  }
}

function renderOrderRows(orders){
  const tbody = document.getElementById('orders-tbody');
  if(!tbody) return;
  tbody.innerHTML = '';
  orders.forEach(o => {
    const tr = document.createElement('tr');
    const payClass  = o.status==='paid' ? 'paid' : o.status==='created' ? 'created' : 'failed';
    const shipClass = o.shipping_status==='complete' ? 'ship-complete' : o.shipping_status==='partial' ? 'ship-partial' : 'ship-pending';
    const shipLabel = o.shipping_status || 'pending';
    const date = o.created_at ? new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
    tr.innerHTML = `
      <td><code style="font-family:monospace;font-size:12px;color:var(--text-secondary)">${esc(o.short_id||o.id)}</code></td>
      <td style="color:var(--text-white);font-weight:500;">${esc(o.customer_name||'—')}</td>
      <td>${esc(o.customer_email||'—')}</td>
      <td>${esc(o.customer_phone||'—')}</td>
      <td style="font-weight:600;color:var(--text-white);">${o.amount ? '₹'+(o.amount/100).toLocaleString('en-IN') : '—'}</td>
      <td><span class="pill ${payClass}">${esc(o.status||'—')}</span></td>
      <td><span class="pill ${shipClass}">${esc(shipLabel)}</span></td>
      <td style="color:var(--text-tertiary);">${esc(date)}</td>`;
    tr.addEventListener('click', () => toggleExpand(tr, o));
    tbody.appendChild(tr);
  });
}

function toggleExpand(tr, o){
  const existing = tr.nextSibling;
  if(existing && existing.classList && existing.classList.contains('row-expanded-tr')){
    existing.remove(); return;
  }
  const addr = parseShipping(o.shipping_address);
  const expTr = document.createElement('tr');
  expTr.className = 'row-expanded-tr';
  const td = document.createElement('td');
  td.colSpan = 8;
  td.innerHTML = `
    <div class="expanded-details">
      <div class="expanded-field">
        <div class="expanded-field-label">Shipping Address</div>
        <div class="expanded-field-value">${esc(addr||'Not provided')}</div>
      </div>
      <div class="expanded-field">
        <div class="expanded-field-label">Email Verified</div>
        <div class="expanded-field-value">${o.email_verified ? '✓ Yes' : '✗ No'}</div>
      </div>
      <div class="expanded-field">
        <div class="expanded-field-label">Razorpay Order ID</div>
        <div class="expanded-field-value" style="font-family:monospace;font-size:12px;">${esc(o.razorpay_order_id||'—')}</div>
      </div>
      <div class="expanded-field">
        <div class="expanded-field-label">Payment ID</div>
        <div class="expanded-field-value" style="font-family:monospace;font-size:12px;">${esc(o.razorpay_payment_id||'—')}</div>
      </div>
    </div>`;
  expTr.appendChild(td);
  tr.parentNode.insertBefore(expTr, tr.nextSibling);
}

function parseShipping(raw){
  if(!raw) return null;
  try {
    const j = typeof raw==='string' ? JSON.parse(raw) : raw;
    const parts = [];
    if(j.address1) parts.push(j.address1);
    if(j.address2) parts.push(j.address2);
    if(j.city)     parts.push(j.city);
    if(j.state||j.region) parts.push(j.state||j.region);
    if(j.pincode||j.postcode) parts.push(j.pincode||j.postcode);
    if(j.country)  parts.push(j.country);
    return parts.join(', ');
  } catch(e){ return String(raw); }
}

// ── Waitlist ───────────────────────────────────────────────────
async function showWaitlist(c){
  try {
    const res = await apiFetch('/waitlist');
    const list = await res.json();
    if(!list.length){
      c.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No waitlist entries yet.</p></div>`;
      return;
    }
    c.innerHTML = `
      <div class="admin-toolbar">
        <span class="admin-toolbar-title">${list.length} entr${list.length!==1?'ies':'y'} — newest first</span>
      </div>
      <div class="table-wrap">
        <div class="scroll-x">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Email</th>
                <th>Name</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(w=>`
                <tr>
                  <td style="color:var(--text-white);font-weight:500;">${esc(w.email)}</td>
                  <td>${esc(w.name||'—')}</td>
                  <td style="color:var(--text-tertiary);">${esc(w.created_at||'—')}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load waitlist. Please refresh.</p></div>`;
  }
}

// ── Export ─────────────────────────────────────────────────────
function showExport(c){
  c.innerHTML = `
    <div class="export-panel">
      <div class="eyebrow">Data Export</div>
      <h3 style="margin-bottom:6px;">Download your data</h3>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:0;">Export orders and waitlist as CSV files for reporting or processing.</p>
      <div class="export-item">
        <div class="export-item-info">
          <h4>📋 Orders CSV</h4>
          <p>All orders with customer info, payment status, and shipping details</p>
        </div>
        <button class="admin-btn primary" id="export-orders-btn">Download CSV ↓</button>
      </div>
      <div class="export-item">
        <div class="export-item-info">
          <h4>📧 Waitlist CSV</h4>
          <p>All waitlist email signups with name and date</p>
        </div>
        <button class="admin-btn primary" id="export-waitlist-btn">Download CSV ↓</button>
      </div>
    </div>`;

  document.getElementById('export-orders-btn').addEventListener('click', () => downloadCSV('/orders/csv', 'personalvault-orders.csv'));
  document.getElementById('export-waitlist-btn').addEventListener('click', () => downloadCSV('/waitlist/csv', 'personalvault-waitlist.csv'));
}

async function downloadCSV(path, filename){
  try {
    const res = await apiFetch(path);
    if(!res.ok) throw new Error('Export failed');
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } catch(e){ alert('Export failed. Please try again.'); }
}

// ── Boot ───────────────────────────────────────────────────────
if(getToken()) showDashboard(); else showLogin();

})();
